services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanager-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  backend:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: taskmanager-backend
    working_dir: /src
    volumes:
      - ./backend:/src
    command: >
      sh -c "dotnet restore TaskManager.Api/TaskManager.Api.csproj &&
             dotnet run --project TaskManager.Api/TaskManager.Api.csproj --urls http://0.0.0.0:8080"
    ports:
      - "8081:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mssql_data: